# ==========================================================================
# Congress Trade Watcher — application configuration
#
# Secrets are NEVER stored here. API keys are read from environment variables:
#   FINNHUB_API_KEY, ANTHROPIC_API_KEY
# ==========================================================================

quarkus.application.name=congress-trade-watcher
quarkus.http.port=8080

# --------------------------------------------------------------------------
# Datasource (PostgreSQL). The prod/dev URL points at docker-compose Postgres.
# In %test no URL is set, so Quarkus Dev Services starts a Testcontainers
# Postgres automatically.
# --------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=congress_app
%dev.quarkus.datasource.password=${POSTGRES_PASSWORD:congress_secret}
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/congress
%prod.quarkus.datasource.username=${POSTGRES_USER:congress_app}
%prod.quarkus.datasource.password=${POSTGRES_PASSWORD:congress_secret}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:congress}

# --------------------------------------------------------------------------
# Hibernate ORM — schema is owned by Flyway; Hibernate only validates it.
# camelCase entity fields map to snake_case columns.
# --------------------------------------------------------------------------
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
%dev.quarkus.hibernate-orm.log.sql=false
%test.quarkus.hibernate-orm.log.sql=false

# --------------------------------------------------------------------------
# Logging. Every request gets a correlation id (the [........] field) so all
# log lines of one API call group together. Per call you get, at INFO:
#   -->/<-- inbound request + response + response body   (ApiAccessLoggingFilter)
#   ==>/<== outbound HTTP to Finnhub/Gemini/etc + body   (ExternalClientLoggingFilter)
# Secrets (token/api-key query params, auth headers) are always masked.
# payload-max-chars caps logged bodies (0 disables body logging).
# --------------------------------------------------------------------------
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%X{correlationId}] [%c{1.}] %s%e%n
watcher.logging.payload-max-chars=2000
quarkus.log.category."nz.co.ksktech.congresstrades".level=INFO
%dev.quarkus.log.category."nz.co.ksktech.congresstrades".level=DEBUG

# --------------------------------------------------------------------------
# Flyway — runs migrations at startup (including in tests).
# --------------------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# --------------------------------------------------------------------------
# REST clients
# --------------------------------------------------------------------------
quarkus.rest-client.finnhub-api.url=https://finnhub.io
quarkus.rest-client.finnhub-api.connect-timeout=5000
quarkus.rest-client.finnhub-api.read-timeout=8000

quarkus.rest-client.anthropic-api.url=https://api.anthropic.com
quarkus.rest-client.anthropic-api.connect-timeout=5000
quarkus.rest-client.anthropic-api.read-timeout=40000

quarkus.rest-client.gemini-api.url=https://generativelanguage.googleapis.com
quarkus.rest-client.gemini-api.connect-timeout=5000
quarkus.rest-client.gemini-api.read-timeout=40000

quarkus.rest-client.openrouter-api.url=https://openrouter.ai
quarkus.rest-client.openrouter-api.connect-timeout=5000
quarkus.rest-client.openrouter-api.read-timeout=40000

# Free, no-key open dataset of real STOCK Act disclosures (congress.kadoa.com).
quarkus.rest-client.congress-data.url=https://congress.kadoa.com
quarkus.rest-client.congress-data.connect-timeout=5000
quarkus.rest-client.congress-data.read-timeout=20000

# --------------------------------------------------------------------------
# Application config (watcher.*). API keys come from env vars; everything else
# has a sane default and is tunable here.
# --------------------------------------------------------------------------
watcher.finnhub.api-key=${FINNHUB_API_KEY:}

# LLM narration provider: gemini (default, free tier) or anthropic.
watcher.llm.provider=${LLM_PROVIDER:gemini}

watcher.gemini.api-key=${GEMINI_API_KEY:}
watcher.gemini.model=gemini-flash-latest
watcher.gemini.max-tokens=2048
# 0 disables 2.5-series "thinking" (which would otherwise eat the output budget).
watcher.gemini.thinking-budget=0

watcher.openrouter.api-key=${OPENROUTER_API_KEY:}
watcher.openrouter.model=openrouter/free
watcher.openrouter.max-tokens=2048
watcher.openrouter.reasoning=false

watcher.anthropic.api-key=${ANTHROPIC_API_KEY:}
watcher.anthropic.model=claude-sonnet-4-5
watcher.anthropic.max-tokens=1500
anthropic.api.version=2023-06-01

watcher.signals.lookback-days=45
watcher.signals.cluster-min-members=3
watcher.signals.cluster-window-days=14
watcher.signals.outlier-multiplier=3.0
watcher.signals.late-disclosure-threshold=40
watcher.signals.concentration-window-days=30
watcher.signals.concentration-min-trades=3

# --------------------------------------------------------------------------
# Scheduler — cron-driven ingestion. Quartz-style expression.
# Disabled in dev/test so local runs never auto-hit the external APIs.
# Ingestion source: congress (free open dataset, default) or finnhub (premium).
# --------------------------------------------------------------------------
ingestion.cron=0 0/30 * * * ?
ingestion.source=${INGESTION_SOURCE:congress}
%dev.ingestion.cron=off
%test.ingestion.cron=off

# --------------------------------------------------------------------------
# Cache — daily digest cached so repeated calls don't re-bill Anthropic.
# --------------------------------------------------------------------------
quarkus.cache.caffeine."daily-digest".expire-after-write=12H
quarkus.cache.caffeine."daily-digest".maximum-size=64

# --------------------------------------------------------------------------
# OpenAPI / Swagger UI (served at /q/swagger-ui)
# --------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=Congress Trade Watcher API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Research tool for US Congressional stock-trade disclosures. NOT financial advice.
quarkus.swagger-ui.always-include=true

# --------------------------------------------------------------------------
# Dev convenience — permissive CORS for local UI experiments.
# --------------------------------------------------------------------------
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=/.*/

# --------------------------------------------------------------------------
# Test — point external clients at WireMock (set by WireMockTestResource) and
# provide dummy keys so no real API is ever called.
# --------------------------------------------------------------------------
%test.watcher.finnhub.api-key=test-finnhub-key
%test.watcher.anthropic.api-key=test-anthropic-key
%test.watcher.gemini.api-key=test-gemini-key
%test.watcher.openrouter.api-key=test-openrouter-key
